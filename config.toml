#!/visync/config.toml
[iso]
source_dir = ""
download_dir = ""
# ^ We don't download straight to the ventoy drive as its faster to verify and acts as a buffer. --no-buffer flag can override this, but verify will still happen, just on the drive.

[checksums]
enabled = true



###################################
####### DISTRO RECOGNITION ########
###################################
[base_distros]
# Strict internal volume ID matches
arch = "Arch Linux"
fedora = "Fedora"
ubuntu = "Ubuntu"
debian = "Debian"

[fork_overrides]
# Key format: "parent_distro.keyword_in_filename" = "Clean Name"
"arch.omarchy" = "Omarchy"
"arch.manjaro" = "Manjaro"
"ubuntu.pop-os" = "Pop!_OS"
"ubuntu.pop_os" = "Pop!_OS"
"ubuntu.mint" = "Linux Mint"
"debian.kali" = "Kali Linux"
"debian.parrot" = "Parrot Security"

[standalone_matches]
# Text matching targets for standalone distros, flavors, and tools
gparted = "GParted Live"
hbcd = "Hiren's BootCD"
hiren = "Hiren's BootCD"
kodachi = "Linux Kodachi"
nixos = "NixOS"
parrot = "Parrot Security"
systemrescue = "SystemRescue"
rescuezilla = "Rescuezilla"
tiny11 = "Tiny11"

# Specific desktop flavor/version overrides so regex doesn't grab them poorly
fedora-kde = "Fedora KDE"
ubuntu-server = "Ubuntu Server"

###################################
######## DYNAMIC SCRAPERS #########
###################################
#
[distros.Fedora]
clean_name = "Fedora"
keyword = "fedora"
strategy = "fedora_nested"
base_url = "https://archives.fedoraproject.org/pub/archive/fedora/linux/releases/"
version_regex = 'href="([0-9\.]+)/"'
iso_regex = 'href="(Fedora-Workstation-Live-x86_64-[0-9\.-]+\.iso)"'
checksum_url = "{base_url}{version}/{variant_dir}/{arch}/iso/{checksum_stem}-CHECKSUM"
checksum_format = "gpg_checksum"
signing_key_url = "https://fedoraproject.org/fedora.gpg"

[distros.ArchLinux]
clean_name = "Arch Linux"
keyword = "archlinux"
strategy = "direct_match"
base_url = "https://geo.mirror.pkgbuild.com/iso/latest/"
iso_regex = 'href="(archlinux-[0-9\.]+-x86_64\.iso)"'
checksum_url = "{base_url}sha256sums.txt"
checksum_format = "sha256sums"
checksum_algo = "sha256"

[distros.UbuntuServer]
clean_name = "Ubuntu Server"
keyword = "live-server"
strategy = "ubuntu_nested"
base_url = "https://releases.ubuntu.com/"
version_regex = 'href="([0-9\.]+)/"'
iso_regex = 'href="(ubuntu-[0-9\.-]+live-server-amd64\.iso)"'
checksum_url = "{base_url}{version}/SHA256SUMS"
checksum_format = "sha256sums"
checksum_algo = "sha256"

################
##### ARM ######
################

[distros.FedoraARM]
clean_name = "Fedora ARM"
keyword = "fedora-arm"
strategy = "fedora_nested"
base_url = "https://archives.fedoraproject.org/pub/archive/fedora/linux/releases/"
version_regex = 'href="([0-9\.]+)/"'
# Fedora lists aarch64 images under its standard variant subtrees
iso_regex = 'href="(Fedora-Workstation-Live-aarch64-[0-9\.-]+\.iso)"'
# checksum_url: needs version — same pattern as Fedora x86_64
# checksum_format = "gpg_checksum"
# signing_key_url = "https://fedoraproject.org/fedora.gpg"

[distros.ArchLinuxARM]
clean_name = "Arch Linux ARM"
keyword = "archlinuxarm"
strategy = "direct_match"
base_url = "https://os.archlinuxarm.org/os/"
iso_regex = 'href="(ArchLinuxARM-rpi-aarch64-latest\.tar\.gz)"' # Note: ARM targets use rootfs archives or img files
